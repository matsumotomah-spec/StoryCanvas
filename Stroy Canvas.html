<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#16151D" />
<title>StoryCanvas</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2316151D'/%3E%3Cpath d='M20 16h24v32l-12-7-12 7z' fill='%23C9A961'/%3E%3C/svg%3E" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
  :root{
    --bg:#16151D; --panel:#1F1E29; --panel-2:#272533; --line:#34313F;
    --ink:#E8E3D8; --ink-dim:#A29DAE; --ink-faint:#6F6B7C;
    --gold:#C9A961; --gold-soft:#8C7A47; --violet:#9A8FB8; --danger:#D27B6B;
    --radius:14px;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  }
  [data-theme="light"]{
    --bg:#F2EFE8; --panel:#FBF9F4; --panel-2:#F0ECE2; --line:#DAD3C5;
    --ink:#2C2A24; --ink-dim:#6B6557; --ink-faint:#9A937F;
    --gold:#9C7C2E; --gold-soft:#B79A52; --violet:#6E6391; --danger:#B5503C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
  #root{min-height:100%;}
  button{font-family:inherit;cursor:pointer;color:inherit;}
  input,textarea{font-family:inherit;}
  ::selection{background:var(--gold-soft);color:#fff;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

  .shell{max-width:1240px;margin:0 auto;padding:0 22px 80px;}
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:18px;
    padding:18px 0 14px;margin-bottom:6px;
    background:linear-gradient(to bottom,var(--bg) 72%,transparent);backdrop-filter:blur(2px);}
  .brand{display:flex;align-items:baseline;gap:10px;cursor:pointer;user-select:none;}
  .brand .mark{font-family:var(--serif);font-size:26px;letter-spacing:.5px;}
  .brand .mark b{color:var(--gold);font-weight:600;}
  .brand .tag{font-size:11px;color:var(--ink-faint);letter-spacing:.18em;text-transform:uppercase;}
  .spacer{flex:1;}

  .iconbtn{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);
    background:var(--panel);display:grid;place-items:center;transition:.15s;}
  .iconbtn:hover{background:var(--panel-2);border-color:var(--gold-soft);}
  .iconbtn svg{width:19px;height:19px;}
  .primary{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--gold-soft);
    background:var(--gold);color:#1b1710;font-weight:600;border-radius:11px;padding:0 16px;height:40px;transition:.15s;}
  .primary:hover{filter:brightness(1.06);}
  [data-theme="light"] .primary{color:#fff;}

  .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin:8px 0 26px;}
  .search{position:relative;flex:1;min-width:220px;}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--ink-faint);}
  .search input{width:100%;height:44px;border-radius:12px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);padding:0 14px 0 40px;font-size:14px;outline:none;}
  .search input:focus{border-color:var(--gold-soft);}
  .seg{display:flex;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel);}
  .seg button{height:44px;padding:0 14px;border:0;background:transparent;color:var(--ink-dim);font-size:13px;}
  .seg button.on{background:var(--panel-2);color:var(--ink);}
  .seg button+button{border-left:1px solid var(--line);}
  select.sortsel{height:44px;border-radius:12px;border:1px solid var(--line);background:var(--panel);
    color:var(--ink-dim);padding:0 12px;font-size:13px;outline:none;}

  .grid{display:grid;gap:20px;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));}
  @media(max-width:900px){.grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;}}
  @media(max-width:520px){.grid{grid-template-columns:repeat(2,1fr);gap:12px;}}

  .card{position:relative;border-radius:var(--radius);overflow:hidden;background:var(--panel);
    border:1px solid var(--line);cursor:pointer;transition:transform .18s,border-color .18s;display:flex;flex-direction:column;}
  .card:hover{transform:translateY(-3px);border-color:var(--gold-soft);}
  .plate{position:relative;aspect-ratio:4/5;overflow:hidden;background:#0c0b11;}
  .plate img{width:100%;height:100%;object-fit:cover;display:block;}
  .plate.blank{display:grid;place-items:center;color:var(--ink-faint);}
  .plate.blank svg{width:40px;height:40px;opacity:.4;}
  .plate::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(8,7,12,.86) 0%,rgba(8,7,12,.05) 46%);}
  .plate.blank::after{display:none;}
  .frontis{position:absolute;left:14px;right:14px;bottom:12px;z-index:2;}
  .frontis h3{margin:0;font-family:var(--serif);font-size:17px;font-weight:600;line-height:1.25;color:#F3EEE3;
    text-shadow:0 1px 6px rgba(0,0,0,.5);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .frontis .meta{margin-top:5px;font-size:11px;color:#cdc6d6;letter-spacing:.04em;display:flex;gap:10px;}
  .frontis .meta .imgs{color:var(--gold);}
  .blank .frontis h3{color:var(--ink);text-shadow:none;}
  .blank .frontis .meta{color:var(--ink-faint);}
  .fav{position:absolute;top:10px;right:10px;z-index:3;width:30px;height:30px;border-radius:50%;
    background:rgba(20,18,26,.6);border:1px solid rgba(255,255,255,.12);display:grid;place-items:center;backdrop-filter:blur(3px);}
  .fav svg{width:16px;height:16px;color:#fff;opacity:.85;}
  .fav.on svg{color:var(--gold);opacity:1;fill:var(--gold);}
  .delbtn{position:absolute;top:10px;left:10px;z-index:3;width:30px;height:30px;border-radius:50%;
    background:rgba(20,18,26,.55);border:1px solid rgba(255,255,255,.1);display:grid;place-items:center;opacity:0;transition:.15s;}
  .card:hover .delbtn{opacity:1;}
  .delbtn:hover{background:var(--danger);}
  .delbtn svg{width:15px;height:15px;color:#fff;}

  .empty{text-align:center;padding:90px 20px;color:var(--ink-faint);}
  .empty .big{font-family:var(--serif);font-size:24px;color:var(--ink-dim);margin-bottom:8px;}
  .empty p{font-size:14px;margin:0 0 22px;}

  .ed-head{display:flex;align-items:center;margin-bottom:22px;gap:16px;}
  .backlink{display:inline-flex;align-items:center;gap:7px;color:var(--ink-dim);font-size:14px;border:0;background:transparent;padding:0;}
  .backlink:hover{color:var(--ink);}
  .backlink svg{width:18px;height:18px;}
  .saver{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-faint);letter-spacing:.05em;}
  .saver .dot{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);}
  .saver.saving .dot{background:var(--violet);animation:pulse 1s infinite;}
  .saver.saved .dot{background:var(--gold);}
  @keyframes pulse{0%,100%{opacity:.3;}50%{opacity:1;}}

  .ed-wrap{max-width:820px;margin:0 auto;}
  .titleinput{width:100%;border:0;background:transparent;color:var(--ink);font-family:var(--serif);
    font-size:30px;font-weight:600;line-height:1.2;outline:none;padding:2px 0;margin-bottom:4px;}
  .titleinput::placeholder{color:var(--ink-faint);}
  .countline{font-size:12px;color:var(--ink-faint);letter-spacing:.04em;margin-bottom:18px;display:flex;gap:14px;}

  .field-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint);
    margin:26px 0 10px;display:flex;align-items:center;gap:8px;}
  .field-label::after{content:"";flex:1;height:1px;background:var(--line);}

  .dropzone{border:1.5px dashed var(--line);border-radius:14px;background:var(--panel);transition:.15s;}
  .dropzone.drag{border-color:var(--gold);background:var(--panel-2);}
  .strip{display:flex;gap:12px;overflow-x:auto;padding:14px;scroll-snap-type:x proximity;}
  .strip::-webkit-scrollbar{height:8px;}
  .strip::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px;}
  .imgcard{position:relative;flex:0 0 150px;scroll-snap-align:start;border-radius:11px;overflow:hidden;
    border:1px solid var(--line);background:#0c0b11;transition:.12s;}
  .imgcard.dragging{opacity:.4;}
  .imgcard.over{border-color:var(--gold);}
  .imgcard.cover{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset;}
  .imgcard .thumb{aspect-ratio:1/1;cursor:grab;}
  .imgcard .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .imgcard .ord{position:absolute;top:6px;left:6px;background:rgba(18,16,24,.75);color:#fff;
    font-size:11px;border-radius:6px;padding:1px 6px;font-variant-numeric:tabular-nums;}
  .imgcard .cover-flag{position:absolute;top:6px;right:6px;background:var(--gold);color:#1b1710;
    font-size:10px;font-weight:700;border-radius:6px;padding:1px 6px;}
  .imgcard .tools{display:flex;border-top:1px solid var(--line);}
  .imgcard .tools button{flex:1;height:32px;border:0;background:var(--panel);color:var(--ink-dim);
    display:grid;place-items:center;}
  .imgcard .tools button+button{border-left:1px solid var(--line);}
  .imgcard .tools button:hover{background:var(--panel-2);color:var(--ink);}
  .imgcard .tools button.del:hover{color:var(--danger);}
  .imgcard .tools svg{width:15px;height:15px;}
  .imgcard .cap{font-size:11px;color:var(--ink-faint);padding:5px 7px;border-top:1px solid var(--line);
    line-height:1.4;max-height:42px;overflow:hidden;}
  .addtile{flex:0 0 150px;display:grid;place-items:center;border:1px dashed var(--line);border-radius:11px;
    color:var(--ink-faint);background:transparent;gap:6px;min-height:150px;}
  .addtile:hover{border-color:var(--gold-soft);color:var(--ink-dim);}
  .addtile svg{width:24px;height:24px;}
  .addtile small{font-size:11px;}
  .strip-empty{padding:34px;text-align:center;color:var(--ink-faint);font-size:13px;}
  .strip-empty b{color:var(--gold);font-weight:600;cursor:pointer;}

  textarea.body{width:100%;border:1px solid var(--line);background:var(--panel);color:var(--ink);
    border-radius:12px;padding:16px 18px;font-family:var(--serif);font-size:16px;line-height:1.85;
    resize:vertical;min-height:340px;outline:none;}
  textarea.body:focus,textarea.notes:focus{border-color:var(--gold-soft);}
  textarea.notes{width:100%;border:1px solid var(--line);background:var(--panel);color:var(--ink-dim);
    border-radius:12px;padding:13px 15px;font-size:14px;line-height:1.6;resize:vertical;min-height:90px;outline:none;}
  .insertbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .insertchip{border:1px solid var(--line);background:var(--panel-2);border-radius:8px;height:30px;
    padding:0 10px;font-size:12px;color:var(--ink-dim);display:inline-flex;align-items:center;gap:5px;}
  .insertchip:hover{border-color:var(--gold-soft);color:var(--ink);}

  .tags{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--line);
    border-radius:999px;padding:5px 10px 5px 12px;font-size:13px;color:var(--ink);}
  .chip button{border:0;background:transparent;color:var(--ink-faint);font-size:15px;line-height:1;padding:0;}
  .chip button:hover{color:var(--danger);}
  .taginput{border:0;background:transparent;color:var(--ink);outline:none;font-size:14px;min-width:130px;height:30px;}
  .taginput::placeholder{color:var(--ink-faint);}
  .favtoggle{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--line);background:var(--panel);
    border-radius:11px;height:42px;padding:0 16px;font-size:14px;color:var(--ink-dim);}
  .favtoggle.on{border-color:var(--gold-soft);color:var(--gold);}
  .favtoggle svg{width:17px;height:17px;}
  .favtoggle.on svg{fill:var(--gold);color:var(--gold);}

  .reader{max-width:760px;margin:0 auto;}
  .reader .cover{width:100%;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);
    background:#0c0b11;margin-bottom:26px;cursor:zoom-in;}
  .reader .cover img{width:100%;display:block;max-height:70vh;object-fit:cover;}
  .reader h1{font-family:var(--serif);font-size:34px;line-height:1.25;margin:0 0 6px;}
  .reader .rmeta{color:var(--ink-faint);font-size:13px;margin-bottom:30px;display:flex;gap:14px;flex-wrap:wrap;}
  .reader .rmeta .imgs{color:var(--gold);}
  .rbody{font-family:var(--serif);font-size:17px;line-height:1.95;white-space:pre-wrap;word-break:break-word;}
  .rbody .embed{margin:22px 0;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:#0c0b11;cursor:zoom-in;}
  .rbody .embed img{width:100%;display:block;}
  .rbody .embed figcaption{font-family:var(--sans);font-size:12px;color:var(--ink-faint);padding:8px 12px;background:var(--panel);}
  .rbody .missing{display:inline-block;font-family:var(--sans);font-size:12px;color:var(--ink-faint);
    border:1px dashed var(--line);border-radius:6px;padding:2px 8px;}
  .rtags{display:flex;gap:8px;flex-wrap:wrap;margin:30px 0 0;}
  .rtags .chip{cursor:default;}
  .rgallery{margin-top:38px;}
  .rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
  .rgrid figure{margin:0;border-radius:11px;overflow:hidden;border:1px solid var(--line);background:#0c0b11;cursor:zoom-in;}
  .rgrid figure img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;}
  .rgrid figcaption{font-size:11px;color:var(--ink-faint);padding:6px 8px;line-height:1.4;}
  .editfab{position:fixed;right:24px;bottom:24px;z-index:40;}

  .viewer{position:fixed;inset:0;z-index:90;background:rgba(6,5,9,.94);display:flex;flex-direction:column;animation:fade .15s ease;}
  .viewer .vtop{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;color:#ddd;}
  .viewer .vcount{font-size:13px;color:#bbb;font-variant-numeric:tabular-nums;}
  .viewer .vclose{width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.06);color:#fff;display:grid;place-items:center;}
  .viewer .vclose:hover{background:rgba(255,255,255,.14);}
  .viewer .vstage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;padding:0 8px 8px;min-height:0;}
  .viewer .vstage img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px;}
  .vnav{position:absolute;top:50%;transform:translateY(-50%);width:52px;height:52px;border-radius:50%;
    border:1px solid rgba(255,255,255,.15);background:rgba(20,18,26,.5);color:#fff;display:grid;place-items:center;backdrop-filter:blur(4px);}
  .vnav:hover{background:rgba(255,255,255,.16);}
  .vnav.prev{left:14px;} .vnav.next{right:14px;}
  .vnav svg{width:24px;height:24px;}
  .vcap{color:#cfcad6;font-size:13px;text-align:center;padding:10px 20px 20px;max-width:680px;margin:0 auto;line-height:1.5;}
  @media(max-width:600px){.vnav{width:44px;height:44px;}}

  .overlay{position:fixed;inset:0;z-index:60;background:rgba(8,7,12,.62);display:grid;place-items:center;
    padding:20px;backdrop-filter:blur(3px);animation:fade .15s ease;}
  @keyframes fade{from{opacity:0;}}
  .modal{width:100%;max-width:460px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:26px;}
  .modal h2{font-family:var(--serif);font-size:22px;margin:0 0 4px;}
  .modal .sub{color:var(--ink-faint);font-size:13px;margin:0 0 20px;}
  .stat{display:flex;justify-content:space-between;padding:11px 0;border-top:1px solid var(--line);font-size:14px;}
  .stat .v{color:var(--gold);font-variant-numeric:tabular-nums;}
  .row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
  .btn-line{flex:1;min-width:140px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);
    border-radius:11px;height:44px;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
  .btn-line:hover{border-color:var(--gold-soft);}
  .btn-line svg{width:16px;height:16px;}
  .modal .close{margin-top:22px;width:100%;height:44px;border-radius:11px;border:0;background:var(--gold);color:#1b1710;font-weight:600;}
  [data-theme="light"] .modal .close{color:#fff;}
  .confirm p{font-size:14px;line-height:1.6;color:var(--ink-dim);margin:0 0 22px;}
  .confirm .danger-btn{background:var(--danger);color:#fff;border:0;border-radius:11px;height:44px;flex:1;font-weight:600;}
  .confirm .cancel-btn{background:var(--panel-2);border:1px solid var(--line);border-radius:11px;height:44px;flex:1;color:var(--ink);}
  .modal textarea.capedit{width:100%;border:1px solid var(--line);background:var(--panel-2);color:var(--ink);
    border-radius:11px;padding:12px 14px;font-size:14px;line-height:1.6;resize:vertical;min-height:110px;outline:none;}
  .modal textarea.capedit:focus{border-color:var(--gold-soft);}
  .caplen{font-size:11px;color:var(--ink-faint);text-align:right;margin-top:6px;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:95;background:var(--panel-2);
    border:1px solid var(--line);color:var(--ink);padding:12px 20px;border-radius:12px;font-size:14px;
    box-shadow:0 8px 30px rgba(0,0,0,.4);animation:rise .2s ease;}
  @keyframes rise{from{transform:translate(-50%,8px);opacity:0;}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const DB_NAME="storycanvas", S_STORY="stories", S_IMAGE="images";
const MAX_IMAGES=100, MAX_CAPTION=500, MAX_TITLE=255;

const uuid=()=> (crypto.randomUUID?crypto.randomUUID()
  :'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);return v.toString(16);}));

function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,2);
    req.onupgradeneeded=(ev)=>{
      const db=req.result; const t=req.transaction;
      if(!db.objectStoreNames.contains(S_STORY)){
        const os=db.createObjectStore(S_STORY,{keyPath:"id"});
        os.createIndex("updatedAt","updatedAt"); os.createIndex("createdAt","createdAt");
      }
      if(!db.objectStoreNames.contains(S_IMAGE)){
        const oi=db.createObjectStore(S_IMAGE,{keyPath:"id"});
        oi.createIndex("storyId","storyId");
      }
      if(ev.oldVersion>0 && ev.oldVersion<2){
        const storyStore=t.objectStore(S_STORY);
        const imgStore=t.objectStore(S_IMAGE);
        storyStore.openCursor().onsuccess=(e)=>{
          const cur=e.target.result; if(!cur) return;
          const s=cur.value;
          if(s.image){
            const imgId=uuid();
            imgStore.put({id:imgId,storyId:s.id,image:s.image,thumbnail:s.thumbnail||s.image,
              caption:"",order:1,createdAt:s.createdAt||Date.now()});
            s.coverImageId=imgId;
          }
          delete s.image; delete s.thumbnail;
          cur.update(s); cur.continue();
        };
      }
    };
    req.onsuccess=()=>resolve(req.result);
    req.onerror=()=>reject(req.error);
  });
}
function txn(stores,mode){ return openDB().then(db=>{const t=db.transaction(stores,mode);return {t,store:(n)=>t.objectStore(n)};});}
async function allStories(){const {store}=await txn(S_STORY,"readonly");
  return new Promise((res,rej)=>{const r=store(S_STORY).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}
async function getStory(id){const {store}=await txn(S_STORY,"readonly");
  return new Promise((res,rej)=>{const r=store(S_STORY).get(id);r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error);});}
async function putStory(s){const {t,store}=await txn(S_STORY,"readwrite");store(S_STORY).put(s);
  return new Promise((res,rej)=>{t.oncomplete=res;t.onerror=()=>rej(t.error);});}
async function imagesOf(storyId){const {store}=await txn(S_IMAGE,"readonly");
  const idx=store(S_IMAGE).index("storyId");
  return new Promise((res,rej)=>{const r=idx.getAll(IDBKeyRange.only(storyId));
    r.onsuccess=()=>res((r.result||[]).sort((a,b)=>a.order-b.order));r.onerror=()=>rej(r.error);});}
async function putImage(img){const {t,store}=await txn(S_IMAGE,"readwrite");store(S_IMAGE).put(img);
  return new Promise((res,rej)=>{t.oncomplete=res;t.onerror=()=>rej(t.error);});}
async function putImagesBulk(imgs){const {t,store}=await txn(S_IMAGE,"readwrite");imgs.forEach(i=>store(S_IMAGE).put(i));
  return new Promise((res,rej)=>{t.oncomplete=res;t.onerror=()=>rej(t.error);});}
async function deleteImage(id){const {t,store}=await txn(S_IMAGE,"readwrite");store(S_IMAGE).delete(id);
  return new Promise((res,rej)=>{t.oncomplete=res;t.onerror=()=>rej(t.error);});}
async function deleteStoryCascade(id){const imgs=await imagesOf(id);
  const {t,store}=await txn([S_STORY,S_IMAGE],"readwrite");
  store(S_STORY).delete(id); imgs.forEach(i=>store(S_IMAGE).delete(i.id));
  return new Promise((res,rej)=>{t.oncomplete=res;t.onerror=()=>rej(t.error);});}
async function galleryData(){
  const stories=await allStories();
  const {store}=await txn(S_IMAGE,"readonly");
  const idx=store(S_IMAGE).index("storyId");
  return Promise.all(stories.map(s=>new Promise((res)=>{
    const r=idx.getAll(IDBKeyRange.only(s.id));
    r.onsuccess=()=>{const imgs=(r.result||[]).sort((a,b)=>a.order-b.order);
      let cover=s.coverImageId?imgs.find(i=>i.id===s.coverImageId):null;
      if(!cover) cover=imgs[0]||null;
      res({...s,_count:imgs.length,_cover:cover?cover.thumbnail:null,_captions:imgs.map(i=>i.caption||"").join(" ")});};
    r.onerror=()=>res({...s,_count:0,_cover:null,_captions:""});
  })));
}

const countChars=(s)=> (s||"").replace(/\s/g,"").length;
function fmtDate(ts){const d=new Date(ts),p=n=>String(n).padStart(2,"0");return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())}`;}
function fmtDateTime(ts){const d=new Date(ts),p=n=>String(n).padStart(2,"0");return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
const ACCEPT="image/jpeg,image/png,image/webp";
const okType=t=>/^image\/(jpeg|jpg|png|webp)$/.test(t||"");

function makeThumbnail(blob){
  return new Promise((resolve)=>{
    const img=new Image(),url=URL.createObjectURL(blob);
    img.onload=()=>{const max=300;let w=img.width,h=img.height;
      if(w>=h){if(w>max){h=Math.round(h*max/w);w=max;}}else{if(h>max){w=Math.round(w*max/h);h=max;}}
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);URL.revokeObjectURL(url);
      cv.toBlob(b=>resolve(b||blob),"image/jpeg",0.8);};
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(blob);};
    img.src=url;});
}
async function buildImages(storyId,files,startOrder){
  const out=[]; let ord=startOrder;
  for(const f of files){ if(!okType(f.type)) continue;
    const blob=f instanceof Blob?f:new Blob([f]);
    const thumb=await makeThumbnail(blob);
    out.push({id:uuid(),storyId,image:blob,thumbnail:thumb,caption:"",order:ord++,createdAt:Date.now()});
  }
  return out;
}
function useObjectUrl(blob){
  const [url,setUrl]=useState(null);
  useEffect(()=>{if(!blob){setUrl(null);return;}const u=URL.createObjectURL(blob);setUrl(u);return ()=>URL.revokeObjectURL(u);},[blob]);
  return url;
}

let _fi;
function pickImages(multiple,cb){
  if(!_fi){_fi=document.createElement("input");_fi.type="file";_fi.accept=ACCEPT;_fi.style.display="none";document.body.appendChild(_fi);}
  _fi.multiple=!!multiple; _fi.value="";
  _fi.onchange=()=>{const fs=[..._fi.files].filter(f=>okType(f.type));if(fs.length)cb(multiple?fs:fs[0]);};
  _fi.click();
}

function App(){
  const [theme,setTheme]=useState(()=>localStorage.getItem("sc-theme")||"dark");
  const [view,setView]=useState({name:"gallery"});
  const [stories,setStories]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [toast,setToast]=useState(null);

  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);
    localStorage.setItem("sc-theme",theme);
    document.querySelector('meta[name=theme-color]').setAttribute("content",theme==="dark"?"#16151D":"#F2EFE8");},[theme]);

  const reload=useCallback(async()=>{setStories(await galleryData());},[]);
  useEffect(()=>{reload();},[reload]);
  const showToast=(m)=>{setToast(m);setTimeout(()=>setToast(null),2200);};

  const openReader=(id)=>setView({name:"reader",id});
  const openEditor=(id)=>setView({name:"editor",id});
  const goGallery=async()=>{await reload();setView({name:"gallery"});};

  const createNew=async()=>{
    const now=Date.now();
    const story={id:uuid(),title:"",content:"",notes:"",tags:[],favorite:false,
      coverImageId:null,wordCount:0,createdAt:now,updatedAt:now};
    await putStory(story); await reload(); openEditor(story.id);
  };

  return (
    <div className="shell">
      <div className="topbar">
        <div className="brand" onClick={goGallery}>
          <span className="mark">Story<b>Canvas</b></span>
          <span className="tag">一枚の絵から</span>
        </div>
        <div className="spacer"/>
        {view.name==="gallery" && (<>
          <button className="iconbtn" title="テーマ切替" onClick={()=>setTheme(t=>t==="dark"?"light":"dark")}>
            <Svg d={theme==="dark"?I.sun:I.moon}/></button>
          <button className="iconbtn" title="設定" onClick={()=>setShowSettings(true)}><Svg d={I.gear}/></button>
          <button className="primary" onClick={createNew}><Svg d={I.plus} width="18" height="18"/> 新規作成</button>
        </>)}
      </div>

      {stories===null ? <div className="empty"><div className="big">読み込み中…</div></div>
        : view.name==="gallery" ? <Gallery stories={stories} onOpen={openReader} onCreate={createNew} onChange={reload} showToast={showToast}/>
        : view.name==="reader" ? <Reader id={view.id} onBack={goGallery} onEdit={()=>openEditor(view.id)}/>
        : <Editor id={view.id} onBack={()=>openReader(view.id)} showToast={showToast}/>}

      {showSettings && <Settings stories={stories} onClose={()=>setShowSettings(false)} onChange={reload} showToast={showToast}/>}
      {toast && <div className="toast">{toast}</div>}
    </div>
  );

function Gallery({stories,onOpen,onCreate,onChange,showToast}){
  const [q,setQ]=useState(""); const [filter,setFilter]=useState("all");
  const [sort,setSort]=useState("updated"); const [confirmDel,setConfirmDel]=useState(null);

  let list=stories.slice();
  if(filter==="fav") list=list.filter(s=>s.favorite);
  if(q.trim()){const k=q.trim().toLowerCase();
    list=list.filter(s=> (s.title||"").toLowerCase().includes(k)||(s.content||"").toLowerCase().includes(k)
      ||(s.notes||"").toLowerCase().includes(k)||(s.tags||[]).some(t=>t.toLowerCase().includes(k))
      ||(s._captions||"").toLowerCase().includes(k));}
  list.sort((a,b)=> sort==="title"?(a.title||"").localeCompare(b.title||"","ja")
    :sort==="created"?b.createdAt-a.createdAt:b.updatedAt-a.updatedAt);

  const toggleFav=async(e,s)=>{e.stopPropagation();await putStory({...s,favorite:!s.favorite,updatedAt:Date.now()});onChange();};
  const doDelete=async()=>{await deleteStoryCascade(confirmDel.id);setConfirmDel(null);onChange();showToast("作品を削除しました");};

  return (
    <div>
      <div className="controls">
        <div className="search"><Svg d={I.search}/>
          <input placeholder="タイトル・本文・メモ・タグ・キャプションを検索" value={q} onChange={e=>setQ(e.target.value)}/></div>
        <div className="seg">
          <button className={filter==="all"?"on":""} onClick={()=>setFilter("all")}>全件</button>
          <button className={filter==="fav"?"on":""} onClick={()=>setFilter("fav")}>お気に入り</button>
        </div>
        <select className="sortsel" value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="updated">更新日時が新しい順</option>
          <option value="created">作成日時が新しい順</option>
          <option value="title">タイトル昇順</option>
        </select>
      </div>

      {list.length===0 ? (stories.length===0 ? (
        <div className="empty"><div className="big">まだ物語がありません</div>
          <p>画像と文章を組み合わせて、最初の物語をつくりましょう。</p>
          <button className="primary" onClick={onCreate}><Svg d={I.plus} width="18" height="18"/> 新規作成</button></div>
      ):(
        <div className="empty"><div className="big">該当する作品がありません</div>
          <p>検索条件や絞り込みを変えてみてください。</p></div>
      )):(
        <div className="grid">{list.map(s=><Card key={s.id} s={s} onOpen={onOpen} onFav={toggleFav} onDel={()=>setConfirmDel(s)}/>)}</div>
      )}

      {confirmDel && (
        <div className="overlay" onClick={()=>setConfirmDel(null)}>
          <div className="modal confirm" onClick={e=>e.stopPropagation()}>
            <h2>削除しますか？</h2>
            <p>「{confirmDel.title||"無題"}」と、その画像 {confirmDel._count} 枚を削除します。この操作は取り消せません。</p>
            <div className="row">
              <button className="cancel-btn" onClick={()=>setConfirmDel(null)}>キャンセル</button>
              <button className="danger-btn" onClick={doDelete}>削除する</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Card({s,onOpen,onFav,onDel}){
  const url=useObjectUrl(s._cover);
  return (
    <div className="card" onClick={()=>onOpen(s.id)}>
      <div className={"plate"+(url?"":" blank")}>
        {url ? <img src={url} alt="" loading="lazy"/> : <Svg d={I.image}/>}
        <button className="delbtn" title="削除" onClick={e=>{e.stopPropagation();onDel();}}><Svg d={I.trash}/></button>
        <button className={"fav"+(s.favorite?" on":"")} title="お気に入り" onClick={e=>onFav(e,s)}><Svg d={I.star}/></button>
        <div className="frontis">
          <h3>{s.title||"無題"}</h3>
          <div className="meta"><span className="imgs">画像：{s._count}枚</span><span>{fmtDate(s.updatedAt)}</span></div>
        </div>
      </div>
    </div>
  );
}

function Editor({id,onBack,showToast}){
  const [story,setStory]=useState(null);
  const [images,setImages]=useState([]);
  const [saveState,setSaveState]=useState("saved");
  const [tagDraft,setTagDraft]=useState("");
  const [dragOver,setDragOver]=useState(false);
  const [capEdit,setCapEdit]=useState(null);
  const [delImg,setDelImg]=useState(null);
  const [busy,setBusy]=useState(false);
  const timer=useRef(null); const latest=useRef(null); const bodyRef=useRef(null);

  const load=useCallback(async()=>{const s=await getStory(id);setStory(s);latest.current=s;setImages(await imagesOf(id));},[id]);
  useEffect(()=>{load();},[load]);

  const persist=async(s)=>{const toSave={...s,wordCount:countChars(s.content),updatedAt:Date.now()};
    await putStory(toSave);latest.current=toSave;setSaveState("saved");};
  const queueSave=useCallback((next)=>{latest.current=next;setSaveState("saving");
    if(timer.current)clearTimeout(timer.current);
    timer.current=setTimeout(()=>persist(latest.current),3000);},[]);
  useEffect(()=>()=>{if(timer.current)clearTimeout(timer.current);if(latest.current)persist(latest.current);},[]);
  useEffect(()=>{const h=()=>{if(latest.current)persist(latest.current);};
    window.addEventListener("beforeunload",h);return()=>window.removeEventListener("beforeunload",h);},[]);

  if(!story) return <div className="empty"><div className="big">読み込み中…</div></div>;
  const patch=(p)=>{const next={...story,...p};setStory(next);queueSave(next);};

  const addFiles=async(files)=>{
    const room=MAX_IMAGES-images.length;
    if(room<=0){showToast(`画像は1作品 ${MAX_IMAGES} 枚までです`);return;}
    const take=[...files].slice(0,room);
    setBusy(true);
    const startOrder=(images.reduce((m,i)=>Math.max(m,i.order),0))+1;
    const recs=await buildImages(id,take,startOrder);
    await putImagesBulk(recs);
    const next=[...images,...recs].sort((a,b)=>a.order-b.order);
    setImages(next);
    if(!story.coverImageId && recs[0]) patch({coverImageId:recs[0].id});
    setBusy(false);
    if([...files].length>room) showToast(`上限により ${take.length} 枚を追加しました`);
  };
  const onDrop=(e)=>{e.preventDefault();setDragOver(false);
    const files=[...(e.dataTransfer?.files||[])].filter(f=>okType(f.type));if(files.length)addFiles(files);};

  const reorder=async(fromId,toId)=>{
    if(fromId===toId) return;
    const arr=images.slice();
    const from=arr.findIndex(i=>i.id===fromId), to=arr.findIndex(i=>i.id===toId);
    if(from<0||to<0) return;
    const [m]=arr.splice(from,1); arr.splice(to,0,m);
    const renum=arr.map((i,idx)=>({...i,order:idx+1}));
    setImages(renum);
    await putImagesBulk(renum);
  };
  const removeImage=async(img)=>{
    await deleteImage(img.id);
    const remain=images.filter(i=>i.id!==img.id).map((i,idx)=>({...i,order:idx+1}));
    if(remain.length) await putImagesBulk(remain);
    setImages(remain);
    if(story.coverImageId===img.id) patch({coverImageId:remain[0]?remain[0].id:null});
    setDelImg(null); showToast("画像を削除しました");
  };
  const setCover=(img)=>{patch({coverImageId:img.id});showToast("表紙に設定しました");};
  const saveCaption=async(img,text)=>{
    const upd={...img,caption:text.slice(0,MAX_CAPTION)};
    await putImage(upd);
    setImages(images.map(i=>i.id===img.id?upd:i));
    setCapEdit(null);
  };
  const insertRef=(n)=>{
    const ta=bodyRef.current; const tag=`[image:${n}]`;
    const v=story.content; const pos=ta?ta.selectionStart:v.length;
    const before=v.slice(0,pos), after=v.slice(pos);
    const ins=(before&&!before.endsWith("\n")?"\n":"")+tag+"\n";
    patch({content:before+ins+after});
    requestAnimationFrame(()=>{if(ta){ta.focus();const c=before.length+ins.length;ta.setSelectionRange(c,c);}});
  };

  const back=async()=>{if(timer.current)clearTimeout(timer.current);await persist(latest.current);onBack();};
  const addTag=(raw)=>{const t=raw.trim();if(!t)return;
    if((story.tags||[]).includes(t)){setTagDraft("");return;}
    patch({tags:[...(story.tags||[]),t]});setTagDraft("");};

  return (
    <div>
      <div className="ed-head">
        <button className="backlink" onClick={back}><Svg d={I.back}/> 閲覧へ戻る</button>
        <div style={{flex:1}}/>
        <div className={"saver "+saveState}><span className="dot"/>{saveState==="saving"?"保存中…":"保存済み"}</div>
      </div>

      <div className="ed-wrap">
        <input className="titleinput" placeholder="無題" maxLength={MAX_TITLE}
          value={story.title} onChange={e=>patch({title:e.target.value})}/>
        <div className="countline">
          <span>文字数：{countChars(story.content)}</span>
          <span>画像：{images.length}/{MAX_IMAGES}枚</span>
        </div>
        <div className="tags" style={{marginBottom:6}}>
          {(story.tags||[]).map(t=>(<span className="chip" key={t}>{t}
            <button onClick={()=>patch({tags:story.tags.filter(x=>x!==t)})}>×</button></span>))}
          <input className="taginput" placeholder="タグを追加 (Enter)" value={tagDraft}
            onChange={e=>setTagDraft(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();addTag(tagDraft);}
              if(e.key==="Backspace"&&!tagDraft&&story.tags.length)patch({tags:story.tags.slice(0,-1)});}}/>
          <button className={"favtoggle"+(story.favorite?" on":"")} style={{marginLeft:"auto"}}
            onClick={()=>patch({favorite:!story.favorite})}>
            <Svg d={I.star}/>{story.favorite?"お気に入り":"お気に入りに追加"}</button>
        </div>

        <div className="field-label">画像ギャラリー</div>
        <div className={"dropzone"+(dragOver?" drag":"")}
          onDragOver={e=>{e.preventDefault();setDragOver(true);}}
          onDragLeave={e=>{e.preventDefault();setDragOver(false);}}
          onDrop={onDrop}>
          {images.length===0 ? (
            <div className="strip-empty">
              ここに画像をドラッグ＆ドロップ、または <b onClick={()=>pickImages(true,addFiles)}>ファイルを選択</b><br/>
              <small style={{color:"var(--ink-faint)"}}>jpg / png / webp ・最大{MAX_IMAGES}枚</small>
            </div>
          ):(
            <div className="strip">
              {images.map(img=>(
                <ImageCard key={img.id} img={img} isCover={story.coverImageId===img.id}
                  onReorder={reorder} onDelete={()=>setDelImg(img)} onCaption={()=>setCapEdit(img)}
                  onCover={()=>setCover(img)} onInsert={()=>insertRef(img.order)}/>
              ))}
              {images.length<MAX_IMAGES && (
                <button className="addtile" onClick={()=>pickImages(true,addFiles)}>
                  <Svg d={I.plus}/><small>画像を追加</small></button>
              )}
            </div>
          )}
        </div>
        {busy && <div style={{fontSize:12,color:"var(--ink-faint)",marginTop:8}}>画像を処理中…</div>}

        <div className="field-label">本文</div>
        {images.length>0 && (
          <div className="insertbar">
            <span style={{fontSize:12,color:"var(--ink-faint)",alignSelf:"center",marginRight:4}}>挿入：</span>
            {images.map(img=>(
              <button key={img.id} className="insertchip" onClick={()=>insertRef(img.order)}>
                <Svg d={I.image} width="13" height="13"/>[image:{img.order}]</button>
            ))}
          </div>
        )}
        <textarea ref={bodyRef} className="body" placeholder="ここから物語を書きはじめましょう…"
          value={story.content} onChange={e=>patch({content:e.target.value})}/>

        <div className="field-label">メモ</div>
        <textarea className="notes" placeholder="着想・設定・覚え書きなど"
          value={story.notes} onChange={e=>patch({notes:e.target.value})}/>
      </div>

      {capEdit && <CaptionModal img={capEdit} onClose={()=>setCapEdit(null)} onSave={saveCaption}/>}
      {delImg && (
        <div className="overlay" onClick={()=>setDelImg(null)}>
          <div className="modal confirm" onClick={e=>e.stopPropagation()}>
            <h2>画像を削除しますか？</h2>
            <p>この画像（{delImg.order}枚目）を削除します。本文中の参照は残りますが画像は表示されなくなります。</p>
            <div className="row">
              <button className="cancel-btn" onClick={()=>setDelImg(null)}>キャンセル</button>
              <button className="danger-btn" onClick={()=>removeImage(delImg)}>削除する</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function ImageCard({img,isCover,onReorder,onDelete,onCaption,onCover,onInsert}){
  const url=useObjectUrl(img.thumbnail);
  const [drag,setDrag]=useState(false);const [over,setOver]=useState(false);
  return (
    <div className={"imgcard"+(drag?" dragging":"")+(over?" over":"")+(isCover?" cover":"")}
      onDragOver={e=>{e.preventDefault();setOver(true);}}
      onDragLeave={()=>setOver(false)}
      onDrop={e=>{e.preventDefault();setOver(false);const from=e.dataTransfer.getData("text/imgid");if(from)onReorder(from,img.id);}}>
      <div className="thumb" draggable
        onDragStart={e=>{e.dataTransfer.setData("text/imgid",img.id);e.dataTransfer.effectAllowed="move";setDrag(true);}}
        onDragEnd={()=>setDrag(false)}>
        {url && <img src={url} alt="" loading="lazy"/>}
      </div>
      <span className="ord">{img.order}</span>
      {isCover && <span className="cover-flag">表紙</span>}
      <div className="tools">
        <button title="本文に挿入" onClick={onInsert}><Svg d={I.image}/></button>
        <button title="キャプション" onClick={onCaption}><Svg d={I.caption}/></button>
        <button title="表紙に設定" onClick={onCover}><Svg d={I.flag}/></button>
        <button className="del" title="削除" onClick={onDelete}><Svg d={I.trash}/></button>
      </div>
      {img.caption && <div className="cap">{img.caption}</div>}
    </div>
  );
}

function CaptionModal({img,onClose,onSave}){
  const [text,setText]=useState(img.caption||"");
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h2>キャプション</h2>
        <p className="sub">{img.order}枚目の画像の説明（最大{MAX_CAPTION}文字）</p>
        <textarea className="capedit" autoFocus value={text}
          maxLength={MAX_CAPTION} onChange={e=>setText(e.target.value)}
          placeholder="この画像の説明を入力"/>
        <div className="caplen">{text.length} / {MAX_CAPTION}</div>
        <div className="row">
          <button className="cancel-btn" onClick={onClose}>キャンセル</button>
          <button className="danger-btn" style={{background:"var(--gold)",color:"#1b1710"}} onClick={()=>onSave(img,text)}>保存</button>
        </div>
      </div>
    </div>
  );
}

function Reader({id,onBack,onEdit}){
  const [story,setStory]=useState(null);
  const [images,setImages]=useState([]);
  const [viewer,setViewer]=useState(null);

  useEffect(()=>{let alive=true;
    (async()=>{const s=await getStory(id);const imgs=await imagesOf(id);
      if(alive){setStory(s);setImages(imgs);}})();
    return()=>{alive=false;};},[id]);

  const segments=useMemo(()=>{
    const out=[]; const re=/\[image:(\d+)\]/g; let last=0,m;
    const text=(story&&story.content)||"";
    while((m=re.exec(text))){
      if(m.index>last) out.push({type:"text",value:text.slice(last,m.index)});
      out.push({type:"img",n:parseInt(m[1],10)});
      last=re.lastIndex;
    }
    if(last<text.length) out.push({type:"text",value:text.slice(last)});
    return out;
  },[story]);

  if(!story) return <div className="empty"><div className="big">読み込み中…</div></div>;

  const byOrder=new Map(images.map(i=>[i.order,i]));
  let cover=story.coverImageId?images.find(i=>i.id===story.coverImageId):null;
  if(!cover) cover=images[0]||null;
  const openViewer=(img)=>setViewer(images.findIndex(i=>i.id===img.id));

  return (
    <div className="reader">
      <div className="ed-head">
        <button className="backlink" onClick={onBack}><Svg d={I.back}/> 一覧へ戻る</button>
      </div>

      {cover && <ReaderCover img={cover} onClick={()=>openViewer(cover)}/>}
      <h1>{story.title||"無題"}</h1>
      <div className="rmeta">
        {story.favorite && <span style={{color:"var(--gold)"}}>★ お気に入り</span>}
        <span className="imgs">画像：{images.length}枚</span>
        <span>更新：{fmtDateTime(story.updatedAt)}</span>
      </div>

      <div className="rbody">
        {segments.map((seg,i)=> seg.type==="text"
          ? <span key={i}>{seg.value}</span>
          : (byOrder.get(seg.n)
              ? <Embed key={i} img={byOrder.get(seg.n)} onClick={()=>openViewer(byOrder.get(seg.n))}/>
              : <span key={i} className="missing">［画像 {seg.n} は見つかりません］</span>)
        )}
      </div>

      {(story.tags||[]).length>0 && (
        <div className="rtags">{story.tags.map(t=><span className="chip" key={t}>{t}</span>)}</div>
      )}

      {images.length>0 && (
        <div className="rgallery">
          <div className="field-label">画像ギャラリー</div>
          <div className="rgrid">
            {images.map(img=><GalleryFig key={img.id} img={img} onClick={()=>openViewer(img)}/>)}
          </div>
        </div>
      )}

      <button className="primary editfab" onClick={onEdit}><Svg d={I.edit} width="17" height="17"/> 編集</button>

      {viewer!==null && images[viewer] && (
        <Viewer images={images} index={viewer} onIndex={setViewer} onClose={()=>setViewer(null)}/>
      )}
    </div>
  );
}
function ReaderCover({img,onClick}){const url=useObjectUrl(img.image);
  return <div className="cover" onClick={onClick}>{url&&<img src={url} alt="" loading="lazy"/>}</div>;}
function Embed({img,onClick}){const url=useObjectUrl(img.image);
  return (<figure className="embed" onClick={onClick}>{url&&<img src={url} alt="" loading="lazy"/>}
    {img.caption && <figcaption>{img.caption}</figcaption>}</figure>);}
function GalleryFig({img,onClick}){const url=useObjectUrl(img.thumbnail);
  return (<figure onClick={onClick}>{url&&<img src={url} alt="" loading="lazy"/>}
    {img.caption && <figcaption>{img.caption}</figcaption>}</figure>);}

function Viewer({images,index,onIndex,onClose}){
  const img=images[index]; const url=useObjectUrl(img.image);
  const prev=()=>onIndex((index-1+images.length)%images.length);
  const next=()=>onIndex((index+1)%images.length);
  useEffect(()=>{const h=(e)=>{if(e.key==="Escape")onClose();if(e.key==="ArrowLeft")prev();if(e.key==="ArrowRight")next();};
    window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);});
  const sx=useRef(null);
  const ts=e=>{sx.current=e.touches[0].clientX;};
  const te=e=>{if(sx.current==null)return;const dx=e.changedTouches[0].clientX-sx.current;
    if(dx>50)prev();else if(dx<-50)next();sx.current=null;};
  return (
    <div className="viewer" onClick={onClose}>
      <div className="vtop" onClick={e=>e.stopPropagation()}>
        <span className="vcount">{index+1} / {images.length}</span>
        <button className="vclose" onClick={onClose}><Svg d={I.x}/></button>
      </div>
      <div className="vstage" onClick={e=>e.stopPropagation()} onTouchStart={ts} onTouchEnd={te}>
        {images.length>1 && <button className="vnav prev" onClick={prev}><Svg d={I.chevL}/></button>}
        {url && <img src={url} alt=""/>}
        {images.length>1 && <button className="vnav next" onClick={next}><Svg d={I.chevR}/></button>}
      </div>
      {img.caption && <div className="vcap" onClick={e=>e.stopPropagation()}>{img.caption}</div>}
    </div>
  );
}

function Settings({stories,onClose,onChange,showToast}){
  const [busy,setBusy]=useState(false);
  const [importConfirm,setImportConfirm]=useState(null);
  const totalImages=stories.reduce((a,s)=>a+(s._count||0),0);

  const guessType=(name="")=>/\.png$/i.test(name)?"image/png":/\.webp$/i.test(name)?"image/webp":"image/jpeg";
  const extOf=(type)=>type==="image/png"?"png":type==="image/webp"?"webp":"jpg";

  const exportZip=async()=>{
    setBusy(true);
    try{
      const zip=new JSZip(); const imgRoot=zip.folder("images"); const manifest=[];
      const all=await allStories();
      let sIdx=1;
      for(const s of all){
        const imgs=await imagesOf(s.id);
        const folder="story"+sIdx;
        const dir=imgRoot.folder(folder);
        const imgMeta=[]; let n=1;
        for(const im of imgs){
          const fname=String(n).padStart(3,"0")+"."+extOf(im.image&&im.image.type||"image/jpeg");
          if(im.image) dir.file(fname,im.image);
          imgMeta.push({id:im.id,file:folder+"/"+fname,caption:im.caption||"",order:im.order});
          n++;
        }
        manifest.push({id:s.id,title:s.title,content:s.content,notes:s.notes,
          coverImageId:s.coverImageId||null,tags:s.tags||[],favorite:!!s.favorite,
          createdAt:s.createdAt,updatedAt:s.updatedAt,images:imgMeta});
        sIdx++;
      }
      zip.file("stories.json",JSON.stringify(manifest,null,2));
      const blob=await zip.generateAsync({type:"blob"});
      const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="backup.zip";a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),1000);
      showToast("バックアップを作成しました");
    }catch(e){showToast("エクスポートに失敗しました");}
    setBusy(false);
  };

  const chooseImport=()=>{
    const inp=document.createElement("input");inp.type="file";inp.accept=".zip,application/zip";
    inp.onchange=async()=>{const f=inp.files[0];if(!f)return;setBusy(true);
      try{
        const zip=await JSZip.loadAsync(f);
        const jf=zip.file("stories.json");
        if(!jf){showToast("stories.json が見つかりません");setBusy(false);return;}
        const manifest=JSON.parse(await jf.async("string"));
        if(!Array.isArray(manifest))throw new Error("bad");
        const built=[];
        for(const m of manifest){
          const imgs=[];
          for(const im of (m.images||[])){
            let blob=null;
            const entry=zip.file("images/"+im.file)||zip.file(im.file);
            if(entry){const raw=await entry.async("blob");blob=new Blob([raw],{type:guessType(im.file)});}
            const thumb=blob?await makeThumbnail(blob):null;
            imgs.push({id:im.id||uuid(),storyId:m.id,image:blob,thumbnail:thumb,
              caption:(im.caption||"").slice(0,MAX_CAPTION),order:im.order||imgs.length+1,createdAt:Date.now()});
          }
          built.push({story:{id:m.id||uuid(),title:m.title||"",content:m.content||"",notes:m.notes||"",
            tags:Array.isArray(m.tags)?m.tags:[],favorite:!!m.favorite,coverImageId:m.coverImageId||null,
            wordCount:countChars(m.content||""),createdAt:m.createdAt||Date.now(),updatedAt:m.updatedAt||Date.now()},images:imgs});
        }
        const existing=new Set((await allStories()).map(s=>s.id));
        const dups=built.filter(b=>existing.has(b.story.id)).length;
        setBusy(false);
        if(dups>0) setImportConfirm({built,dups});
        else await runImport(built);
      }catch(e){showToast("zipの読み込みに失敗しました");setBusy(false);}
    };
    inp.click();
  };

  const runImport=async(built)=>{
    setBusy(true);
    for(const b of built){
      const old=await imagesOf(b.story.id);
      for(const o of old) await deleteImage(o.id);
      await putStory(b.story);
      if(b.images.length) await putImagesBulk(b.images);
    }
    setBusy(false);setImportConfirm(null);await onChange();
    showToast(`${built.length}件を取り込みました`);
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h2>設定</h2>
        <p className="sub">データはこの端末内にのみ保存されます。</p>
        <div style={{marginBottom:8,fontSize:12,letterSpacing:".14em",textTransform:"uppercase",color:"var(--ink-faint)"}}>ストレージ情報</div>
        <div className="stat"><span>保存作品数</span><span className="v">{stories.length}</span></div>
        <div className="stat"><span>画像総数</span><span className="v">{totalImages}</span></div>
        <div style={{margin:"22px 0 8px",fontSize:12,letterSpacing:".14em",textTransform:"uppercase",color:"var(--ink-faint)"}}>データ管理</div>
        <div className="row" style={{marginTop:0}}>
          <button className="btn-line" disabled={busy} onClick={exportZip}><Svg d={I.down}/> バックアップ作成</button>
          <button className="btn-line" disabled={busy} onClick={chooseImport}><Svg d={I.up}/> データ復元</button>
        </div>
        {busy && <div style={{fontSize:12,color:"var(--ink-faint)",marginTop:14,textAlign:"center"}}>処理中…</div>}
        <button className="close" onClick={onClose}>閉じる</button>
      </div>

      {importConfirm && (
        <div className="overlay" onClick={()=>setImportConfirm(null)}>
          <div className="modal confirm" onClick={e=>e.stopPropagation()}>
            <h2>上書きの確認</h2>
            <p>同じIDの作品が {importConfirm.dups} 件あります。取り込むと既存の作品と画像が上書きされます。続けますか？</p>
            <div className="row">
              <button className="cancel-btn" onClick={()=>setImportConfirm(null)}>キャンセル</button>
              <button className="danger-btn" style={{background:"var(--gold)",color:"#1b1710"}}
                onClick={()=>runImport(importConfirm.built)}>取り込む</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

(function setupPWA(){
  try{
    const manifest={name:"StoryCanvas",short_name:"StoryCanvas",start_url:".",display:"standalone",
      background_color:"#16151D",theme_color:"#16151D",
      icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='42' fill='%2316151D'/%3E%3Cpath d='M60 48h72v96l-36-21-36 21z' fill='%23C9A961'/%3E%3C/svg%3E",sizes:"192x192",type:"image/svg+xml"}]};
    const link=document.createElement("link");link.rel="manifest";
    link.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:"application/json"}));
    document.head.appendChild(link);
    if("serviceWorker" in navigator){
      const sw='const C="storycanvas-v2";self.addEventListener("install",e=>self.skipWaiting());self.addEventListener("activate",e=>self.clients.claim());self.addEventListener("fetch",e=>{e.respondWith(caches.open(C).then(cache=>cache.match(e.request).then(hit=>{const net=fetch(e.request).then(res=>{if(e.request.method==="GET"&&res.ok)cache.put(e.request,res.clone());return res;}).catch(()=>hit);return hit||net;})));});';
      navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"text/javascript"}))).catch(()=>{});
    }
  }catch(e){}
})();

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
